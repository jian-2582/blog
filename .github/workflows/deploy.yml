name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Configure deploy key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Upload release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          RELEASE_ID=$(date +%Y%m%d%H%M%S)
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /srv/www/site/releases/$RELEASE_ID"
          rsync -az --delete dist/ "$DEPLOY_USER@$DEPLOY_HOST:/srv/www/site/releases/$RELEASE_ID/"

      - name: Switch current release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "ln -sfn /srv/www/site/releases/$RELEASE_ID /srv/www/site/current && find /srv/www/site/releases -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf"
